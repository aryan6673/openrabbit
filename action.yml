name: OpenRabbit
description: GitHub Action that generates PR review summaries and inline comments using any LLM provider.
inputs:
  github_token:
    description: GitHub token for PR review actions
    required: false
  llm_provider:
    description: LLM provider key
    required: false
    default: groq
  llm_api_url:
    description: Base URL for the LLM provider
    required: false
    default: https://api.groq.ai/v1
  llm_api_key:
    description: API key for the LLM provider
    required: false
  llm_model:
    description: Model name for Groq chat completions
    required: false
    default: openai/gpt-oss-120b
  review_mode:
    description: Create summary, inline comments, or both
    required: false
    default: both
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
      working-directory: ${{ github.action_path }}
    - name: Build action
      run: npm run build
      working-directory: ${{ github.action_path }}
    - name: Run Coderabbit reviewer
      run: node dist/action.js
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        LLM_PROVIDER: ${{ inputs.llm_provider }}
        LLM_API_URL: ${{ inputs.llm_api_url }}
        LLM_API_KEY: ${{ inputs.llm_api_key }}
          LLM_MODEL: ${{ inputs.llm_model }}
