name: Open-Rabbit
description: GitHub Action that generates PR review summaries and inline comments using any LLM provider.
branding:
  icon: chevron-left
  color: orange
inputs:
  github_token:
    description: GitHub token for PR review actions
    required: false
  bot_token:
    description: Optional GitHub personal access token or app installation token to post comments as a bot account
    required: false
  llm_provider:
    description: LLM provider key
    required: false
    default: openrouter
  llm_api_url:
    description: Base URL for the LLM provider
    required: false
    default: https://openrouter.ai/api/v1
  llm_api_key:
    description: API key for the LLM provider
    required: false
  llm_model:
    description: Model name for the configured LLM provider
    required: false
    default: openrouter/free
  review_mode:
    description: Create summary, inline comments, or both
    required: false
    default: both
  tone_mode:
    description: Tone profile for the review output
    required: false
    default: balanced
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Build action
      run: npm run build
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: OpenRabbit
      run: node dist/action.js
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        LLM_PROVIDER: ${{ inputs.llm_provider }}
        LLM_API_URL: ${{ inputs.llm_api_url }}
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        LLM_MODEL: ${{ inputs.llm_model }}
        REVIEW_MODE: ${{ inputs.review_mode }}
        TONE_MODE: ${{ inputs.tone_mode }}
