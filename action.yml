name: Open-Rabbit
description: GitHub Action that generates PR review summaries and inline comments using any LLM provider.
branding:
  icon: chevron-left
  color: orange
permissions:
  contents: read
  pull-requests: write
  issues: read
inputs:
  github_token:
    description: GitHub token for PR review actions. Optional — the runner's GITHUB_TOKEN will be used if omitted. Pass ${{ secrets.GITHUB_TOKEN }} to be explicit.
    required: false
  bot_token:
    description: Optional bot token for alternate GitHub authentication (e.g., app or PAT). Provide as an input or use the `BOT_TOKEN` env/secret.
    required: false
  # No token inputs: the action runs with the runner's GITHUB_TOKEN by default.
  # Token override inputs are intentionally omitted to avoid accidental token overrides
  # when users install the action from the Marketplace.
  llm_provider:
    description: LLM provider key
    required: false
    default: openrouter
  llm_api_url:
    description: Base URL for the LLM provider
    required: false
    default: https://openrouter.ai/api/v1
  llm_api_key:
    description: API key for the LLM provider. Provide this as a repository secret (for example: ${{ secrets.LLM_API_KEY }}).
    required: true
  llm_model:
    description: Model name for the configured LLM provider
    required: false
    default: openrouter/free
  review_mode:
    description: Create summary, inline comments, or both
    required: false
    default: both
  tone_mode:
    description: Tone profile for the review output
    required: false
    default: balanced
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Build action
      run: npm run build
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: OpenRabbit
      run: node dist/action.js
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ inputs.github_token || secrets.GITHUB_TOKEN }}
        BOT_TOKEN: ${{ inputs.bot_token || secrets.BOT_TOKEN }}
        LLM_PROVIDER: ${{ inputs.llm_provider }}
        LLM_API_URL: ${{ inputs.llm_api_url }}
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        LLM_MODEL: ${{ inputs.llm_model }}
        REVIEW_MODE: ${{ inputs.review_mode }}
        TONE_MODE: ${{ inputs.tone_mode }}
